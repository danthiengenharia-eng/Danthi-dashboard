<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danthi Dashboard - OS CEF</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --accent: #9c0404;
            --accent-wine: #881438;
            --accent-purple: #34245c;
            --mica-bg: #0e0e10;
            --mica-surface: rgba(255,255,255,0.035);
            --mica-surface-hover: rgba(255,255,255,0.06);
            --mica-border: rgba(255,255,255,0.07);
            --mica-border-light: rgba(255,255,255,0.12);
            --glass-bg: rgba(255,255,255,0.045);
            --glass-border: rgba(255,255,255,0.12);
            --glass-highlight: rgba(255,255,255,0.08);
            --text-primary: #f2f2f4;
            --text-secondary: #8e8e96;
            --text-muted: #4a4a52;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--mica-bg);
            background-image:
                radial-gradient(ellipse 80% 60% at 15% 0%, rgba(52,36,92,0.22) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 85% 100%, rgba(136,20,56,0.14) 0%, transparent 55%);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 24px;
            background: rgba(14,14,16,0.75);
            backdrop-filter: blur(28px) saturate(150%);
            -webkit-backdrop-filter: blur(28px) saturate(150%);
            border-bottom: 1px solid var(--mica-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: rgba(156,4,4,0.12);
            border: 1px solid rgba(156,4,4,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-placeholder svg {
            width: 24px;
            height: 24px;
        }

        .brand {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-family: 'Figtree', sans-serif;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            color: var(--text-primary);
            line-height: 1;
        }

        .brand-sub {
            font-size: 9px;
            letter-spacing: 0.30em;
            text-transform: uppercase;
            color: var(--accent-wine);
            margin-top: 3px;
        }

        .header-actions {
            margin-left: auto;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-refresh {
            font-size: 12px;
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(156,4,4,0.35);
            background: rgba(156,4,4,0.10);
            color: rgba(220,140,140,0.95);
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-refresh:hover {
            background: rgba(156,4,4,0.18);
            border-color: rgba(156,4,4,0.55);
        }

        .btn-refresh:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .main-layout {
            display: flex;
            min-height: calc(100vh - 69px);
        }

        .sidebar {
            width: 220px;
            background: rgba(255,255,255,0.02);
            border-right: 1px solid var(--mica-border);
            padding: 20px 0;
        }

        .nav-section {
            margin-bottom: 24px;
        }

        .nav-section-title {
            font-size: 9.5px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            padding: 0 18px 8px;
            font-weight: 500;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 18px;
            font-size: 13px;
            color: var(--text-secondary);
            border-left: 2px solid transparent;
            transition: all 0.15s;
            cursor: pointer;
            text-decoration: none;
        }

        .nav-item:hover {
            background: var(--mica-surface-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            color: var(--text-primary);
            font-weight: 500;
            border-left: 2px solid var(--accent);
            background: linear-gradient(90deg, rgba(156,4,4,0.08), transparent);
        }

        .content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .metric {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 16px;
            position: relative;
            overflow: hidden;
        }

        .metric::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        }

        .metric-accent {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent-wine), transparent);
        }

        .metric-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .metric-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            font-weight: 500;
            color: var(--text-primary);
            margin-top: 6px;
            line-height: 1;
        }

        .metric-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 5%, rgba(255,255,255,0.18) 40%, rgba(255,255,255,0.08) 70%, transparent 95%);
        }

        .glass-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(156,4,4,0.3), transparent);
        }

        .card-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--mica-border);
        }

        .card-title {
            font-family: 'Figtree', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .card-subtitle {
            font-size: 11px;
            color: var(--text-muted);
        }

        .card-body {
            padding: 20px 24px;
        }

        .panel {
            background: var(--mica-surface);
            border: 1px solid var(--mica-border);
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        input, select {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--mica-border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            padding: 8px 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: rgba(156,4,4,0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12.5px;
        }

        thead th {
            font-size: 9.5px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            padding: 12px 16px;
            text-align: left;
            font-weight: 500;
            border-bottom: 1px solid var(--mica-border);
            background: rgba(255,255,255,0.02);
        }

        tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.12s;
        }

        tbody tr:hover {
            background: var(--mica-surface-hover);
        }

        tbody td {
            padding: 12px 16px;
            color: var(--text-secondary);
        }

        tbody td.primary {
            color: var(--text-primary);
            font-weight: 500;
        }

        tbody td.mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .badge {
            font-size: 10.5px;
            padding: 3px 9px;
            border-radius: 20px;
            font-weight: 400;
            display: inline-block;
        }

        .b-ok {
            background: rgba(34,197,94,0.10);
            color: #4ade80;
            border: 1px solid rgba(34,197,94,0.18);
        }

        .b-warn {
            background: rgba(245,158,11,0.10);
            color: #fbbf24;
            border: 1px solid rgba(245,158,11,0.18);
        }

        .b-err {
            background: rgba(239,68,68,0.10);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.18);
        }

        .b-neu {
            background: rgba(255,255,255,0.06);
            color: var(--text-secondary);
            border: 1px solid rgba(255,255,255,0.10);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 20px;
        }

        .error-message {
            background: rgba(239,68,68,0.10);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: var(--radius-md);
            padding: 16px;
            color: #f87171;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .error-title {
            font-weight: 600;
            margin-bottom: 8px;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .metrics-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-container">
            <div class="logo-placeholder">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="stroke: rgba(156,4,4,0.6);"/>
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="stroke: rgba(136,20,56,0.6);"/>
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="stroke: rgba(52,36,92,0.6);"/>
                </svg>
            </div>
            <div class="brand">
                <div class="brand-name">DANTHI</div>
                <div class="brand-sub">Engenharia</div>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn-refresh" onclick="loadData()">
                <span id="refreshText">Atualizar Dados</span>
            </button>
        </div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="nav-section">
                <div class="nav-section-title">Dashboard</div>
                <div class="nav-item active">
                    <span>📊</span>
                    <span>Visão Geral</span>
                </div>
                <div class="nav-item">
                    <span>📋</span>
                    <span>Ordem de Serviço</span>
                </div>
                <div class="nav-item">
                    <span>📈</span>
                    <span>Relatórios</span>
                </div>
            </div>
            <div class="nav-section">
                <div class="nav-section-title">Documentos</div>
                <div class="nav-item">
                    <span>📁</span>
                    <span>Drive CEF</span>
                </div>
                <div class="nav-item">
                    <span>📄</span>
                    <span>Laudos</span>
                </div>
            </div>
        </div>

        <div class="content">
            <div id="errorContainer"></div>
            
            <div class="metrics-grid" id="metricsGrid">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Carregando dados da planilha...</div>
                </div>
            </div>

            <div class="filters" id="filtersContainer" style="display:none;">
                <div class="filter-group">
                    <label>Município</label>
                    <input type="text" id="filterMunicipio" placeholder="Filtrar município..." onkeyup="applyFilters()">
                </div>
                <div class="filter-group">
                    <label>Status</label>
                    <select id="filterStatus" onchange="applyFilters()">
                        <option value="">Todos</option>
                        <option value="Concluído">Concluído</option>
                        <option value="Pendente">Pendente</option>
                        <option value="Em andamento">Em andamento</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Polo</label>
                    <select id="filterPolo" onchange="applyFilters()">
                        <option value="">Todos</option>
                    </select>
                </div>
            </div>

            <div class="glass-card" id="chartCard" style="display:none;">
                <div class="card-header">
                    <div class="card-title">Receita por Polo</div>
                    <div class="card-subtitle">Agrupamento de valores por região</div>
                </div>
                <div class="card-body">
                    <div class="chart-container">
                        <canvas id="revenueChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="panel" id="tablePanel" style="display:none;">
                <table>
                    <thead>
                        <tr>
                            <th>OS</th>
                            <th>Atividade</th>
                            <th>Município</th>
                            <th>Polo</th>
                            <th>Status</th>
                            <th>Valor</th>
                            <th>Data</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = '1Biyq-RJEGcQrrA0g9Gesb-IhUqfwriIoHNzQh3X0SVk';
        const API_KEY = 'AIzaSyAOYnKLinZbzFC7MsEoCRquj0juwEVGCys';
        const SHEET_NAME = 'Controle OS CEF';
        
        let allData = [];
        let revenueChart = null;

        function showError(message, details) {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = `
                <div class="error-message">
                    <div class="error-title">⚠️ Erro ao carregar dados</div>
                    <div>${message}</div>
                    ${details ? `<div style="margin-top:8px;font-size:11px;opacity:0.7;">${details}</div>` : ''}
                </div>
            `;
            console.error('Dashboard Error:', message, details);
        }

        async function loadData() {
            const btn = document.querySelector('.btn-refresh');
            const refreshText = document.getElementById('refreshText');
            const originalText = refreshText.textContent;
            
            refreshText.textContent = 'Carregando...';
            btn.disabled = true;

            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(SHEET_NAME)}?key=${API_KEY}`;
                console.log('Buscando dados da URL:', url);
                
                const response = await fetch(url);
                console.log('Status da resposta:', response.status);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`API retornou erro ${response.status}: ${errorData.error?.message || 'Erro desconhecido'}`);
                }
                
                const data = await response.json();
                console.log('Dados recebidos:', data);
                
                if (!data.values || data.values.length === 0) {
                    throw new Error('A planilha está vazia ou não possui dados');
                }
                
                if (data.values.length < 2) {
                    throw new Error('A planilha precisa ter pelo menos uma linha de cabeçalho e uma linha de dados');
                }
                
                const headers = data.values[0];
                console.log('Cabeçalhos encontrados:', headers);
                
                allData = data.values.slice(1).map(row => {
                    const obj = {};
                    headers.forEach((header, i) => {
                        obj[header] = row[i] || '';
                    });
                    return obj;
                });
                
                console.log(`${allData.length} registros processados`);
                console.log('Exemplo de registro:', allData[0]);
                
                document.getElementById('errorContainer').innerHTML = '';
                renderMetrics();
                renderTable();
                renderChart();
                populateFilters();
                
                document.getElementById('filtersContainer').style.display = 'flex';
                document.getElementById('chartCard').style.display = 'block';
                document.getElementById('tablePanel').style.display = 'block';
                
            } catch (error) {
                console.error('Erro completo:', error);
                showError(
                    error.message,
                    'Verifique se a planilha está compartilhada publicamente e se a aba "Controle OS CEF" existe.'
                );
                document.getElementById('metricsGrid').innerHTML = `
                    <div class="loading">
                        <div style="color: #f87171; font-size: 14px;">❌ Falha ao carregar</div>
                        <div style="margin-top: 8px; font-size: 12px;">Veja os detalhes acima</div>
                    </div>
                `;
            } finally {
                refreshText.textContent = originalText;
                btn.disabled = false;
            }
        }

        function renderMetrics() {
            const total = allData.length;
            const concluido = allData.filter(r => r.Status === 'Concluído').length;
            const pendente = allData.filter(r => r.Status === 'Pendente').length;
            const valorTotal = allData.reduce((sum, r) => {
                const val = parseFloat(r['Valor (R$)']?.replace(/[^\d,]/g, '').replace(',', '.')) || 0;
                return sum + val;
            }, 0);

            document.getElementById('metricsGrid').innerHTML = `
                <div class="metric">
                    <div class="metric-label">Total de OS</div>
                    <div class="metric-value">${total}</div>
                    <div class="metric-sub">Ordens registradas</div>
                    <div class="metric-accent"></div>
                </div>
                <div class="metric">
                    <div class="metric-label">Concluídas</div>
                    <div class="metric-value">${concluido}</div>
                    <div class="metric-sub">${total > 0 ? ((concluido/total)*100).toFixed(1) : 0}% do total</div>
                    <div class="metric-accent"></div>
                </div>
                <div class="metric">
                    <div class="metric-label">Pendentes</div>
                    <div class="metric-value">${pendente}</div>
                    <div class="metric-sub">${total > 0 ? ((pendente/total)*100).toFixed(1) : 0}% do total</div>
                    <div class="metric-accent"></div>
                </div>
                <div class="metric">
                    <div class="metric-label">Valor Total</div>
                    <div class="metric-value">R$ ${valorTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                    <div class="metric-sub">Receita acumulada</div>
                    <div class="metric-accent"></div>
                </div>
            `;
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = allData.map(row => {
                const statusClass = 
                    row.Status === 'Concluído' ? 'b-ok' :
                    row.Status === 'Pendente' ? 'b-warn' :
                    row.Status === 'Em andamento' ? 'b-neu' : 'b-neu';
                
                return `
                    <tr>
                        <td class="primary mono">${row['OS sem pontuação'] || ''}</td>
                        <td class="primary">${row['Atividade'] || ''}</td>
                        <td>${row['Município'] || ''}</td>
                        <td>${row['Polo'] || ''}</td>
                        <td><span class="badge ${statusClass}">${row.Status || ''}</span></td>
                        <td class="mono">${row['Valor (R$)'] || ''}</td>
                        <td>${row['Data de Recebimento'] || ''}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderChart() {
            const poloData = {};
            allData.forEach(row => {
                const polo = row.Polo || 'Sem Polo';
                const valor = parseFloat(row['Valor (R$)']?.replace(/[^\d,]/g, '').replace(',', '.')) || 0;
                poloData[polo] = (poloData[polo] || 0) + valor;
            });

            const labels = Object.keys(poloData);
            const values = Object.values(poloData);

            const ctx = document.getElementById('revenueChart').getContext('2d');
            
            if (revenueChart) {
                revenueChart.destroy();
            }

            revenueChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Receita (R$)',
                        data: values,
                        backgroundColor: 'rgba(156,4,4,0.7)',
                        borderColor: 'rgba(156,4,4,0.9)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.04)' },
                            ticks: { color: '#8e8e96' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#8e8e96' }
                        }
                    }
                }
            });
        }

        function populateFilters() {
            const polos = [...new Set(allData.map(r => r.Polo).filter(Boolean))];
            const filterPolo = document.getElementById('filterPolo');
            filterPolo.innerHTML = '<option value="">Todos</option>' + 
                polos.map(p => `<option value="${p}">${p}</option>`).join('');
        }

        function applyFilters() {
            const municipio = document.getElementById('filterMunicipio').value.toLowerCase();
            const status = document.getElementById('filterStatus').value;
            const polo = document.getElementById('filterPolo').value;

            const filtered = allData.filter(row => {
                const matchMun = !municipio || row['Município']?.toLowerCase().includes(municipio);
                const matchStatus = !status || row.Status === status;
                const matchPolo = !polo || row.Polo === polo;
                return matchMun && matchStatus && matchPolo;
            });

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = filtered.map(row => {
                const statusClass = 
                    row.Status === 'Concluído' ? 'b-ok' :
                    row.Status === 'Pendente' ? 'b-warn' :
                    row.Status === 'Em andamento' ? 'b-neu' : 'b-neu';
                
                return `
                    <tr>
                        <td class="primary mono">${row['OS sem pontuação'] || ''}</td>
                        <td class="primary">${row['Atividade'] || ''}</td>
                        <td>${row['Município'] || ''}</td>
                        <td>${row['Polo'] || ''}</td>
                        <td><span class="badge ${statusClass}">${row.Status || ''}</span></td>
                        <td class="mono">${row['Valor (R$)'] || ''}</td>
                        <td>${row['Data de Recebimento'] || ''}</td>
                    </tr>
                `;
            }).join('');
        }

        // Load on start
        console.log('Iniciando carregamento do dashboard...');
        loadData();
    </script>
</body>
</html>
