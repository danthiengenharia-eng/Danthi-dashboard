<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danthi Engenharia — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Figtree:wght@600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#9c0404;--accent-wine:#881438;--accent-purple:#34245c;
  --mica-bg:#0e0e10;--mica-surface:rgba(255,255,255,0.035);--mica-surface-hover:rgba(255,255,255,0.06);
  --mica-border:rgba(255,255,255,0.07);--mica-border-light:rgba(255,255,255,0.12);
  --glass-bg:rgba(255,255,255,0.045);--glass-border:rgba(255,255,255,0.12);
  --text-primary:#f2f2f4;--text-secondary:#b5b5be;--text-muted:#9e9ea7;
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;
  --topbar-bg:rgba(14,14,16,0.85);
}
body.light-mode{
  --mica-bg:#f0f0f3;--mica-surface:rgba(0,0,0,0.04);--mica-surface-hover:rgba(0,0,0,0.08);
  --mica-border:rgba(0,0,0,0.09);--mica-border-light:rgba(0,0,0,0.15);
  --glass-bg:rgba(255,255,255,0.7);--glass-border:rgba(0,0,0,0.1);
  --text-primary:#1a1a1f;--text-secondary:#4a4a55;--text-muted:#7a7a88;
  --topbar-bg:rgba(240,240,243,0.9);
}
body{
  font-family:'Inter',system-ui,sans-serif;background:var(--mica-bg);
  background-image:radial-gradient(ellipse 80% 60% at 15% 0%,rgba(52,36,92,0.22) 0%,transparent 60%),
                   radial-gradient(ellipse 60% 50% at 85% 100%,rgba(136,20,56,0.14) 0%,transparent 55%);
  color:var(--text-primary);font-size:13px;min-height:100vh;transition:background .3s,color .3s
}
body.light-mode{background-image:radial-gradient(ellipse 80% 60% at 15% 0%,rgba(52,36,92,0.06) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 85% 100%,rgba(136,20,56,0.05) 0%,transparent 55%)}

/* ── TOPBAR ── */
.topbar{
  background:var(--topbar-bg);backdrop-filter:blur(28px) saturate(150%);-webkit-backdrop-filter:blur(28px) saturate(150%);
  color:var(--text-primary);padding:0 1rem;display:flex;align-items:center;gap:6px;height:50px;
  position:sticky;top:0;z-index:200;border-bottom:1px solid var(--mica-border)
}
.brand-logo{height:34px;width:auto;object-fit:contain;flex-shrink:0}
.brand-logo-fallback{display:flex;flex-direction:column;margin-right:4px}
.brand-nm{font-family:'Figtree',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;line-height:1.1}
.brand-sub{font-size:8px;opacity:.55;letter-spacing:0.15em;text-transform:uppercase;margin-top:1px;color:var(--accent-wine)}
.nav-sep{width:1px;height:24px;background:rgba(255,255,255,.15);margin:0 4px}
body.light-mode .nav-sep{background:rgba(0,0,0,.15)}
.nav-ico{background:transparent;border:none;color:rgba(255,255,255,.65);width:36px;height:36px;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;position:relative}
body.light-mode .nav-ico{color:rgba(0,0,0,.5)}
.nav-ico svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.nav-ico.active{background:linear-gradient(90deg,rgba(156,4,4,0.18),transparent);border-left:2px solid var(--accent);color:#fff}
body.light-mode .nav-ico.active{color:var(--accent)}
.nav-ico:hover{background:rgba(255,255,255,.12);color:#fff}
body.light-mode .nav-ico:hover{background:rgba(0,0,0,.08);color:var(--accent)}
.nav-ico .tip{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);background:#111;color:#fff;
  font-size:10px;padding:2px 7px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:.15s;z-index:400}
.nav-ico:hover .tip{opacity:1}
.spacer{flex:1}
.auth-info{font-size:10px;opacity:.6;white-space:nowrap;font-family:'Inter',sans-serif}
.btn-auth{background:rgba(156,4,4,0.10);border:1px solid rgba(156,4,4,0.35);color:rgba(220,140,140,0.95);
  padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;white-space:nowrap;font-weight:500;transition:.15s}
.btn-auth:hover{background:rgba(156,4,4,0.18);border-color:rgba(156,4,4,0.55)}
.btn-dark{background:transparent;border:none;color:rgba(255,255,255,.7);width:32px;height:32px;border-radius:6px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;margin-left:4px;transition:.15s}
body.light-mode .btn-dark{color:rgba(0,0,0,.6)}
.btn-dark:hover{background:rgba(255,255,255,.15);color:#fff}
body.light-mode .btn-dark:hover{background:rgba(0,0,0,.1);color:#000}

/* ── FILTER PANEL (Airtable-style) ── */
.fbar-wrap{position:sticky;top:50px;z-index:100;background:rgba(14,14,16,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--mica-border)}
body.light-mode .fbar-wrap{background:rgba(240,240,243,0.9)}
.fbar-toggle{padding:.4rem .75rem;display:flex;align-items:center;gap:8px}
.fbar-toggle-btn{background:transparent;border:1px solid var(--mica-border);color:var(--text-secondary);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:.15s;font-family:'Inter',sans-serif}
.fbar-toggle-btn:hover{background:var(--mica-surface-hover);color:var(--text-primary)}
.fbar-toggle-btn.active{background:rgba(156,4,4,0.12);border-color:rgba(156,4,4,0.4);color:rgba(220,140,140,0.95)}
.active-chips{display:flex;flex-wrap:wrap;gap:4px;flex:1}
.f-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(156,4,4,0.12);border:1px solid rgba(156,4,4,0.3);color:rgba(220,140,140,0.9);padding:2px 8px;border-radius:12px;font-size:10px;font-weight:500}
.f-chip button{background:none;border:none;color:inherit;cursor:pointer;padding:0;line-height:1;font-size:12px;opacity:.7}
.f-chip button:hover{opacity:1}
.fcount-bar{font-size:11px;color:var(--text-muted);white-space:nowrap;margin-left:auto}

.filter-panel{display:none;padding:.6rem .75rem .75rem;border-top:1px solid var(--mica-border)}
.filter-panel.open{display:block}
.filter-panel-title{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;font-weight:600}
.filter-rows{display:flex;flex-direction:column;gap:6px}
.filter-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.filter-row select,.filter-row input{font-family:'Inter',sans-serif;font-size:11px;padding:5px 8px;border:1px solid var(--mica-border);border-radius:6px;background:var(--mica-surface);color:var(--text-primary);height:28px;transition:.15s;min-width:0}
.filter-row select:focus,.filter-row input:focus{outline:none;border-color:rgba(156,4,4,0.5);background:var(--mica-surface-hover)}
.filter-row select option{background:var(--mica-bg);color:var(--text-primary)}
.filter-row input::placeholder{color:var(--text-muted)}
.filter-logic{font-size:10px;font-weight:600;color:var(--text-muted);min-width:36px;text-transform:uppercase;letter-spacing:.04em}
.sel-field{min-width:130px}
.sel-op{min-width:110px}
.inp-val{flex:1;min-width:120px}
.btn-del-filter{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:rgba(239,68,68,0.7);width:26px;height:26px;border-radius:5px;cursor:pointer;font-size:13px;transition:.15s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.btn-del-filter:hover{background:rgba(239,68,68,0.18);color:#f87171}
.filter-actions{display:flex;gap:8px;margin-top:.5rem}
.btn-add-filter{background:transparent;border:1px dashed var(--mica-border);color:var(--text-muted);padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;transition:.15s;font-family:'Inter',sans-serif}
.btn-add-filter:hover{border-color:var(--mica-border-light);color:var(--text-primary)}
.btn-clr-all{background:rgba(156,4,4,0.08);border:1px solid rgba(156,4,4,0.25);color:rgba(220,140,140,0.8);padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;transition:.15s;font-family:'Inter',sans-serif}
.btn-clr-all:hover{background:rgba(156,4,4,0.16)}

/* ── MAIN CONTENT ── */
.main{padding:.65rem}
.card{background:var(--mica-surface);border:1px solid var(--mica-border);border-radius:var(--radius-md)}
.twrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 140px)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{position:sticky;top:0;z-index:5;text-align:left;padding:8px 10px;border-bottom:1px solid var(--mica-border);
  font-weight:600;color:var(--text-muted);white-space:nowrap;background:rgba(14,14,16,0.97);backdrop-filter:blur(20px);
  font-size:9.5px;text-transform:uppercase;letter-spacing:0.08em;font-family:'Inter',sans-serif;cursor:pointer;user-select:none;transition:.12s}
body.light-mode thead th{background:rgba(240,240,243,0.97)}
thead th:hover{color:var(--text-primary)}
thead th.sort-asc::after{content:' ▲';font-size:8px}
thead th.sort-desc::after{content:' ▼';font-size:8px}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background .12s;cursor:pointer}
body.light-mode tbody tr{border-bottom:1px solid rgba(0,0,0,0.05)}
td{padding:8px 10px;vertical-align:middle;white-space:nowrap;font-weight:500;color:var(--text-secondary);border:none}

/* Status row backgrounds */
.st-concluida  { background: linear-gradient(90deg, rgba(34,197,94,0.08) 0%, transparent 50%); }
.st-cancelada  { background: linear-gradient(90deg, rgba(239,68,68,0.08) 0%, transparent 50%); }
.st-semvist    { background: linear-gradient(90deg, rgba(100,100,120,0.08) 0%, transparent 50%); }
.st-andamento  { background: linear-gradient(90deg, rgba(100,100,120,0.06) 0%, transparent 50%); }
.st-pept-n     { background: linear-gradient(90deg, rgba(59,130,246,0.08) 0%, transparent 50%); }
.st-pept-v     { background: linear-gradient(90deg, rgba(249,115,22,0.08) 0%, transparent 50%); }
.st-vistoriada { background: linear-gradient(90deg, rgba(234,179,8,0.08) 0%, transparent 50%); }
.st-revisao    { background: linear-gradient(90deg, rgba(168,85,247,0.08) 0%, transparent 50%); }

.st-concluida:hover  { background: linear-gradient(90deg, rgba(34,197,94,0.15) 0%, var(--mica-surface-hover) 100%); }
.st-cancelada:hover  { background: linear-gradient(90deg, rgba(239,68,68,0.15) 0%, var(--mica-surface-hover) 100%); }
.st-semvist:hover    { background: linear-gradient(90deg, rgba(100,100,120,0.14) 0%, var(--mica-surface-hover) 100%); }
.st-andamento:hover  { background: linear-gradient(90deg, rgba(100,100,120,0.12) 0%, var(--mica-surface-hover) 100%); }
.st-pept-n:hover     { background: linear-gradient(90deg, rgba(59,130,246,0.15) 0%, var(--mica-surface-hover) 100%); }
.st-pept-v:hover     { background: linear-gradient(90deg, rgba(249,115,22,0.15) 0%, var(--mica-surface-hover) 100%); }
.st-vistoriada:hover { background: linear-gradient(90deg, rgba(234,179,8,0.15) 0%, var(--mica-surface-hover) 100%); }
.st-revisao:hover    { background: linear-gradient(90deg, rgba(168,85,247,0.15) 0%, var(--mica-surface-hover) 100%); }

.badge{display:inline-block;font-size:10px;padding:3px 9px;border-radius:12px;font-weight:600;white-space:nowrap;color:#fff}
.badge-atrasado{background:rgba(239,68,68,0.18);border:1px solid rgba(239,68,68,0.4);color:#f87171;font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700;margin-left:4px}
.badge-vence{background:rgba(245,158,11,0.18);border:1px solid rgba(245,158,11,0.4);color:#fbbf24;font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700;margin-left:4px}

/* ── METRICS / CHARTS ── */
.metrics-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:.75rem}
.metric{background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);
  border-radius:var(--radius-md);padding:.7rem .9rem;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent)}
.metric-accent{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent-wine),transparent)}
.metric .lbl{font-size:10px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;font-weight:500}
.metric .val{font-family:'Inter',sans-serif;font-size:20px;font-weight:600;color:var(--text-primary);line-height:1}
.metric .sub{font-size:10px;color:var(--text-muted);margin-top:3px}

.charts-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:.75rem}
.cc{background:var(--glass-bg);backdrop-filter:blur(32px) saturate(180%);-webkit-backdrop-filter:blur(32px) saturate(180%);
  border:1px solid var(--glass-border);border-radius:var(--radius-lg);padding:.85rem;position:relative;overflow:hidden}
.cc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 5%,rgba(255,255,255,0.18) 40%,rgba(255,255,255,0.08) 70%,transparent 95%)}
.cc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(156,4,4,0.3),transparent)}
.cc h3{font-family:'Figtree',sans-serif;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:.6rem}
.cc.full{grid-column:1/-1}.cc.half{grid-column:span 2}
.leg{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;font-size:10px;color:var(--text-muted)}
.leg span{display:flex;align-items:center;gap:3px}
.lsq{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0}

/* ── DRAWER ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  z-index:300;opacity:0;pointer-events:none;transition:.2s}
.overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;right:0;top:0;bottom:0;width:min(540px,100vw);background:var(--mica-surface);border-left:1px solid var(--mica-border);
  z-index:301;transform:translateX(100%);transition:.25s;overflow-y:auto;display:flex;flex-direction:column}
body.light-mode .drawer{background:rgba(245,245,248,0.98)}
.drawer.open{transform:translateX(0)}

.dhd{padding:.9rem 1rem;border-bottom:1px solid var(--mica-border);display:flex;align-items:flex-start;gap:10px;
  background:rgba(156,4,4,0.10);position:sticky;top:0;z-index:10;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.dhd-main{flex:1;display:flex;flex-direction:column;gap:4px}
.dhd-item-num{display:flex;align-items:center;gap:8px}
.d-item-badge{font-family:'Figtree',sans-serif;font-size:13px;font-weight:600;color:var(--text-muted);line-height:1;letter-spacing:.04em;text-transform:uppercase}
.d-item-label{font-size:10px;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase}
.dhd h2{font-family:'Figtree',sans-serif;font-size:13px;font-weight:600;line-height:1.3;color:var(--text-primary);margin-top:2px}
.dhd .onum{font-size:15px;font-weight:700;font-family:'Inter',sans-serif;color:var(--text-primary);word-break:break-all;line-height:1.3;margin-top:2px}
.dhd-actions{display:flex;gap:6px;align-items:flex-start;flex-shrink:0}
.cbtn{background:rgba(255,255,255,0.08);border:1px solid var(--mica-border);color:var(--text-primary);width:28px;height:28px;
  border-radius:6px;cursor:pointer;font-size:14px;flex-shrink:0;transition:.15s;display:flex;align-items:center;justify-content:center}
.cbtn:hover{background:rgba(255,255,255,0.15)}
body.light-mode .cbtn{background:rgba(0,0,0,0.06)}
.btn-edit-drawer{background:rgba(156,4,4,0.18);border:1px solid rgba(156,4,4,0.5);color:rgba(240,160,160,1);
  padding:6px 14px;border-radius:7px;font-size:12px;cursor:pointer;font-weight:700;transition:.15s;white-space:nowrap;box-shadow:0 2px 8px rgba(156,4,4,0.15)}
.btn-edit-drawer:hover{background:rgba(156,4,4,0.30);border-color:rgba(156,4,4,0.7)}
.btn-save-drawer{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.35);color:#4ade80;
  padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:600;transition:.15s;display:none;white-space:nowrap}
.btn-save-drawer:hover{background:rgba(34,197,94,0.25)}

.dbody{padding:.9rem;flex:1}
.ds{margin-bottom:1.1rem}
.ds h3{font-family:'Figtree',sans-serif;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;
  letter-spacing:0.06em;margin-bottom:.6rem;padding-bottom:5px;border-bottom:1px solid var(--mica-border)}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.df{display:flex;flex-direction:column;gap:3px}.df.full{grid-column:1/-1}
.dl{font-size:10px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:0.04em}
.dv{font-size:12px;color:var(--text-primary);font-weight:500;line-height:1.4}

/* Editable drawer fields */
.dv-input{font-size:12px;color:var(--text-primary);font-weight:500;padding:5px 8px;border:1px solid var(--mica-border);
  border-radius:5px;background:var(--mica-surface);width:100%;font-family:'Inter',sans-serif;transition:.15s;display:none}
.dv-input:focus{outline:none;border-color:rgba(156,4,4,0.5);background:var(--mica-surface-hover)}
.dv-input[readonly]{background:rgba(0,0,0,.15);color:var(--text-muted);cursor:not-allowed}
.edit-mode .dv{display:none}
.edit-mode .dv-input{display:block}

.flist{display:flex;flex-direction:column;gap:5px}
.fi{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--mica-border);border-radius:8px;
  text-decoration:none;color:var(--text-primary);transition:.15s;cursor:pointer;background:var(--mica-surface)}
.fi:hover{background:var(--mica-surface-hover);border-color:var(--mica-border-light)}
.ficon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.stbtns{display:flex;gap:5px;flex-wrap:wrap}
.stbtn{padding:5px 12px;border-radius:6px;border:none;font-size:11px;cursor:pointer;font-weight:600;color:#fff;transition:.15s}
.stbtn:hover{filter:brightness(1.15)}
.contato-card{background:var(--mica-surface);border:1px solid var(--mica-border);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.contato-avatar{width:38px;height:38px;border-radius:50%;background:var(--accent-purple);color:#fff;display:flex;align-items:center;
  justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.contato-tel{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--text-primary)}
.contato-tel a{color:inherit;text-decoration:none}
.contato-tel a:hover{text-decoration:underline}

/* ── PREVIEW OVERLAY ── */
.prev-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  z-index:500;display:none;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.prev-overlay.open{display:flex}
.prev-box{background:var(--mica-surface);border:1px solid var(--mica-border);border-radius:var(--radius-lg);width:min(900px,96vw);
  height:min(700px,90vh);display:flex;flex-direction:column;overflow:hidden}
.prev-hd{background:rgba(14,14,16,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:var(--text-primary);
  padding:.7rem 1rem;display:flex;align-items:center;gap:8px;font-family:'Figtree',sans-serif;font-size:12px;font-weight:600;
  border-bottom:1px solid var(--mica-border)}
.prev-hd span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prev-body{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--mica-bg)}
.prev-body iframe{width:100%;height:100%;border:none}
